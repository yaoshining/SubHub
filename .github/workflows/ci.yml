name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  quality:
    name: 质量门禁
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 格式检查
        run: pnpm format
      - name: 静态检查
        run: pnpm lint
      - name: 类型检查
        run: pnpm typecheck
      - name: 单元测试
        run: pnpm test
      - name: 环境映射与 URL 护栏校验
        run: >-
          pnpm test --
          tests/unit/env/runtime-environment.test.ts
          tests/integration/runtime/preview-branch-mapping.test.ts
          tests/unit/storage/runtime-url-boundary.test.ts
          tests/smoke/nonproduction-runtime.smoke.test.ts
      - name: API 契约链路检查
        run: pnpm api:check

  test-db:
    name: 数据库集成测试
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: subhub_test
          POSTGRES_USER: subhub_test
          POSTGRES_PASSWORD: subhub_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://${{ job.services.postgres.env.POSTGRES_USER }}:${{ job.services.postgres.env.POSTGRES_PASSWORD }}@localhost:5432/${{ job.services.postgres.env.POSTGRES_DB }}
      DATABASE_URL_UNPOOLED: postgresql://${{ job.services.postgres.env.POSTGRES_USER }}:${{ job.services.postgres.env.POSTGRES_PASSWORD }}@localhost:5432/${{ job.services.postgres.env.POSTGRES_DB }}
      DATABASE_URL_TEST: postgresql://${{ job.services.postgres.env.POSTGRES_USER }}:${{ job.services.postgres.env.POSTGRES_PASSWORD }}@localhost:5432/${{ job.services.postgres.env.POSTGRES_DB }}
      DATABASE_URL_TEST_UNPOOLED: postgresql://${{ job.services.postgres.env.POSTGRES_USER }}:${{ job.services.postgres.env.POSTGRES_PASSWORD }}@localhost:5432/${{ job.services.postgres.env.POSTGRES_DB }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 准备测试数据库（reset + migrate）
        run: pnpm db:prepare:ci
      - name: 数据库 schema / migration 漂移校验
        run: pnpm db:check
      - name: migration 后最小校验
        run: >-
          pnpm test --
          tests/unit/storage/postgres-schema.test.ts
          tests/integration/storage/postgres-client.test.ts
      - name: 运行数据库集成测试
        run: pnpm test:db:ci
