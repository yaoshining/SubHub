name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  quality:
    name: 质量门禁
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: 安装依赖
        run: npm ci
      - name: 格式检查
        run: npm run format
      - name: 静态检查
        run: npm run lint
      - name: 类型检查
        run: npm run typecheck
      - name: 单元测试
        run: npm test
      - name: API 契约链路检查
        run: npm run api:check
      - name: 构建
        run: npm run build
