name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  quality:
    name: 质量门禁
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 格式检查
        run: pnpm format
      - name: 静态检查
        run: pnpm lint
      - name: 类型检查
        run: pnpm typecheck
      - name: 单元测试
        run: pnpm test
      - name: 环境映射护栏检查
        run: pnpm test tests/unit/env/runtime-environment.test.ts tests/unit/env/local-development-env.test.ts tests/contract/runtime/environment-contract.test.ts tests/integration/runtime/preview-branch-mapping.test.ts tests/smoke/nonproduction-runtime.smoke.test.ts
      - name: API 契约链路检查
        run: pnpm api:check
