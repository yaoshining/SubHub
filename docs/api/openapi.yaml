          items:
            $ref: "#/components/schemas/SubtitleSearchResult"
    SubtitleSearchResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/SubtitleSearchData"
    ReadinessSummary:
      type: object
      required:
        - environment
        - version
        - adminInitialized
        - activeProviderCount
        - activeCallerKeyCount
        - gatewayReady
        - runtimeGateRequired
        - runtimeReady
        - schemaReady
        - bootstrapReady
        - adminInitializationState
        - directUrlReady
        - directUrlError
        - blockingReasons
        - missingConditions
        - lastCheckedAt
        - partialErrors
      properties:
        environment:
          type: string
          enum:
            - production
            - staging
            - development
            - test
            - unknown
        version:
          type: string
        adminInitialized:
          type: boolean
        activeProviderCount:
          type: integer
          minimum: 0
        activeCallerKeyCount:
          type: integer
          minimum: 0
        gatewayReady:
          type: boolean
        runtimeGateRequired:
          type: boolean
        runtimeReady:
          type: boolean
        schemaReady:
          type: boolean
        bootstrapReady:
          type: boolean
        adminInitializationState:
          type: string
          enum:
            - migrated
            - required
            - completed
        directUrlReady:
          type: boolean
        directUrlError:
          type:
            - string
            - "null"
        blockingReasons:
          type: array
          items:
            type: string
            enum:
              - direct_url_unreachable
              - schema_not_ready
              - bootstrap_not_ready
              - admin_initialization_required
        missingConditions:
          type: array
          items:
            type: string
            enum:
              - admin
              - provider
              - caller_key
        lastCheckedAt:
          type: string
          format: date-time
        partialErrors:
          type: array
          items:
            $ref: "#/components/schemas/ReadinessPartialError"
    ReadinessPartialError:
      type: object
      required:
        - target
        - code
        - message
      properties:
        target:
          type: string
          enum:
            - environment
            - version
            - runtime
            - admin
            - provider
            - caller_key
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
    DashboardNorthStar:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          enum:
            - ready
            - not_ready
        message:
          type: string
    DashboardProviderSnapshotItem:
      type: object
      required:
        - id
        - name
        - type
        - status
        - activeCredentialCount
        - lastHealthStatus
        - lastErrorSummary
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        status:
          type: string
        activeCredentialCount:
          type: integer
          minimum: 0
        lastHealthStatus:
          type: string
          nullable: true
        lastErrorSummary:
          type: string
          nullable: true
    DashboardProviderSnapshot:
      type: object
      required:
        - total
        - available
        - needsAttention
        - items
      properties:
        total:
          type: integer
          minimum: 0
        available:
          type: integer
          minimum: 0
        needsAttention:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: "#/components/schemas/DashboardProviderSnapshotItem"
    DashboardCallerKeySnapshot:
      type: object
      required:
        - active
        - suspended
        - rotated
      properties:
        active:
          type: integer
          minimum: 0
        suspended:
          type: integer
          minimum: 0
        rotated:
          type: integer
          minimum: 0
    DashboardQueueSummary:
      type: object
      required:
        - status
        - pendingJobs
        - failedJobs
      properties:
        status:
          type: string
          enum:
            - idle
        pendingJobs:
          type: integer
          minimum: 0
        failedJobs:
          type: integer
          minimum: 0
    DashboardCacheSummary:
      type: object
      required:
        - status
        - hitRate
        - coverage
      properties:
        status:
          type: string
          enum:
            - not_configured
        hitRate:
          type: number
          nullable: true
        coverage:
          type: string
          enum:
            - not_available
    DashboardRecentIssue:
      type: object
      required:
        - id
        - targetType
        - targetId
        - message
        - createdAt
      properties:
        id:
          type: string
        targetType:
          type: string
        targetId:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    DashboardNextAction:
      type: object
      required:
        - id
        - label
        - href
        - priority
      properties:
        id:
          type: string
        label:
          type: string
        href:
          type: string
        priority:
          type: string
          enum:
            - high
            - medium
    DashboardSummary:
      type: object
      required:
        - readiness
        - northStar
        - providerSnapshot
        - callerKeySnapshot
        - queue
        - cache
        - recentIssues
        - nextActions
      properties:
        readiness:
          $ref: "#/components/schemas/ReadinessSummary"
        northStar:
          $ref: "#/components/schemas/DashboardNorthStar"
        providerSnapshot:
          $ref: "#/components/schemas/DashboardProviderSnapshot"
        callerKeySnapshot:
          $ref: "#/components/schemas/DashboardCallerKeySnapshot"
        queue:
          $ref: "#/components/schemas/DashboardQueueSummary"
        cache:
          $ref: "#/components/schemas/DashboardCacheSummary"
        recentIssues:
          type: array
          items:
            $ref: "#/components/schemas/DashboardRecentIssue"
        nextActions:
          type: array
          items:
            $ref: "#/components/schemas/DashboardNextAction"
    DashboardSummaryResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/DashboardSummary"
    SettingsStatusResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/ReadinessSummary"
tags:
  - name: Admin Auth
    description: 管理端初始化、登录与会话。
  - name: Providers
    description: 上游 Provider 与凭据池。
  - name: Caller Keys
    description: 下游调用方 Key 生命周期。
  - name: Users
    description: 后台成员、邀请与基础会话处置。
  - name: Subtitles
    description: 统一字幕查询与下载出口。
  - name: System
    description: Dashboard、Settings 与系统状态。
