openapi: 3.1.0
info:
  title: SubHub API
  version: 0.2.0
  description: SubHub MVP 管理控制台与统一字幕出口 API 契约骨架。
servers:
  - url: http://localhost:3000
    description: 本地开发
paths:
  /api/admin/bootstrap/status:
    get:
      tags:
        - Admin Auth
      operationId: getAdminBootstrapStatus
      summary: 查询首轮管理员初始化状态
      responses:
        "200":
          description: 初始化状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapStatusResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/bootstrap:
    post:
      tags:
        - Admin Auth
      operationId: createInitialAdmin
      summary: 创建首个管理员
      description: 仅允许在系统尚未完成首轮初始化时调用；重复初始化会被拒绝。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInitialAdminRequest"
      responses:
        "201":
          description: 首个管理员已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInitialAdminResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/auth/login:
    post:
      tags:
        - Admin Auth
      operationId: loginAdmin
      summary: 管理员登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: 登录成功并写入管理员会话 Cookie
          headers:
            Set-Cookie:
              schema:
                type: string
              description: "`subhub_admin_session` HttpOnly 会话 Cookie。"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/auth/logout:
    post:
      tags:
        - Admin Auth
      operationId: logoutAdmin
      summary: 管理员登出
      security:
        - AdminSession: []
      responses:
        "204":
          description: 当前会话已撤销，Cookie 已清理。
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/auth/me:
    get:
      tags:
        - Admin Auth
      operationId: getCurrentAdmin
      summary: 查询当前登录管理员
      security:
        - AdminSession: []
      responses:
        "200":
          description: 当前管理员
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentAdminResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/dashboard/summary:
    get:
      tags:
        - System
      operationId: getAdminDashboardSummary
      summary: 查询 Dashboard 摘要
      description: 返回 Dashboard 所需的首轮开通、Provider、调用方 Key、队列、缓存、最近异常和下一步入口聚合读模型。
      security:
        - AdminSession: []
      responses:
        "200":
          description: Dashboard 摘要
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummaryResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/settings/status:
    get:
      tags:
        - System
      operationId: getAdminSettingsStatus
      summary: 查询 Settings 系统状态
      description: 返回 Settings 页所需的只读系统状态聚合；单项读数失败时仍返回已知信息，并通过 partialErrors 标识失败对象。
      security:
        - AdminSession: []
      responses:
        "200":
          description: Settings 系统状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsStatusResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/providers:
    get:
      tags:
        - Providers
      operationId: listAdminProviders
      summary: 查询 Provider 列表
      description: 返回上游 Provider 与凭据池摘要；不会返回上游凭据明文或密文。
      security:
        - AdminSession: []
      responses:
        "200":
          description: Provider 列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags:
        - Providers
      operationId: createAdminProvider
      summary: 创建 OpenSubtitles Provider
      description: MVP 仅允许创建 OpenSubtitles Provider；可随请求写入首个上游凭据。
      security:
        - AdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderRequest"
      responses:
        "201":
          description: Provider 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDetailResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/providers/{providerId}:
    get:
      tags:
        - Providers
      operationId: getAdminProvider
      summary: 查询 Provider 详情
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      responses:
        "200":
          description: Provider 详情与凭据池
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDetailResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
    patch:
      tags:
        - Providers
      operationId: updateAdminProvider
      summary: 更新 Provider 运行策略
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderRequest"
      responses:
        "200":
          description: Provider 已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDetailResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/providers/{providerId}/enable:
    post:
      tags:
        - Providers
      operationId: enableAdminProvider
      summary: 启用 Provider
      description: 只有存在可参与调度的 active 凭据时才允许启用。
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      responses:
        "200":
          description: Provider 已启用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDetailResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/providers/{providerId}/disable:
    post:
      tags:
        - Providers
      operationId: disableAdminProvider
      summary: 停用 Provider
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      responses:
        "200":
          description: Provider 已停用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDetailResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/providers/{providerId}/credentials:
    get:
      tags:
        - Providers
      operationId: listAdminProviderCredentials
      summary: 查询 Provider 凭据池
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      responses:
        "200":
          description: Provider 凭据列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentialListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags:
        - Providers
      operationId: createAdminProviderCredential
      summary: 新增 Provider 上游凭据
      description: 明文 secret 只允许在写入请求中出现；响应只返回受控展示片段。
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderCredentialRequest"
      responses:
        "201":
          description: Provider 凭据已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentialResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/providers/{providerId}/credentials/{credentialId}/isolate:
    post:
      tags:
        - Providers
      operationId: isolateAdminProviderCredential
      summary: 隔离异常 Provider 凭据
      description: 隔离后该凭据立即退出调度池，不影响同 Provider 下其他 active 凭据。
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
        - $ref: "#/components/parameters/CredentialId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IsolateProviderCredentialRequest"
      responses:
        "200":
          description: Provider 凭据已隔离
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentialActionResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/providers/{providerId}/credentials/{credentialId}/restore:
    post:
      tags:
        - Providers
      operationId: restoreAdminProviderCredential
      summary: 恢复 Provider 凭据
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
        - $ref: "#/components/parameters/CredentialId"
      responses:
        "200":
          description: Provider 凭据已恢复为 active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentialActionResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/caller-keys:
    get:
      tags:
        - Caller Keys
      operationId: listAdminCallerKeys
      summary: 查询 Caller Key 列表
      description: 返回下游调用方 Key inventory；不会返回 keyHash、revealTokenHash 或完整明文。
      security:
        - AdminSession: []
      responses:
        "200":
          description: Caller Key 列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallerKeyListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags:
        - Caller Keys
      operationId: createAdminCallerKey
      summary: 创建 Caller Key
      description: 完整明文 Key 仅在创建响应的受控 reveal window 中返回一次；服务端只持久化 hash 与展示片段。
      security:
        - AdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCallerKeyRequest"
      responses:
        "201":
          description: Caller Key 已创建，完整明文仅本次响应可见。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallerKeyRevealResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/caller-keys/{keyId}/rotate:
    post:
      tags:
        - Caller Keys
      operationId: rotateAdminCallerKey
      summary: 轮换 Caller Key
      description: 轮换后旧 Key 立即失效，新完整明文仅在本次响应中返回。
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/CallerKeyId"
      responses:
        "200":
          description: Caller Key 已轮换
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallerKeyRotationResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/caller-keys/{keyId}/suspend:
    post:
      tags:
        - Caller Keys
      operationId: suspendAdminCallerKey
      summary: 停用 Caller Key
      description: 停用后该 Key 的新字幕查询与下载请求立即被拒绝。
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/CallerKeyId"
      responses:
        "200":
          description: Caller Key 已停用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallerKeyResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/caller-keys/{keyId}/usage:
    get:
      tags:
        - Caller Keys
      operationId: getAdminCallerKeyUsage
      summary: 查询 Caller Key 使用摘要
      description: 返回最近 24 小时内的查询/下载计数与最近记录列表，以及最近轮换结果。
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/CallerKeyId"
      responses:
        "200":
          description: Caller Key 最近查询、下载与轮换摘要
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallerKeyUsageResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/users:
    get:
      tags:
        - Users
      operationId: listAdminUsers
      summary: 查询后台成员、邀请与基础会话摘要
      description: 返回 Users 页所需的成员列表、邀请状态和需要管理员关注的后台会话摘要；不包含权限矩阵、审批流或高级风控信息。
      security:
        - AdminSession: []
      responses:
        "200":
          description: Users 管理摘要
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersOverviewResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/users/invitations:
    post:
      tags:
        - Users
      operationId: createAdminUserInvitation
      summary: 创建后台成员邀请
      description: MVP 仅允许预设角色和 admin_console 接入范围；同一 identifier 不允许同时存在多个 pending 邀请。
      security:
        - AdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdminInvitationRequest"
      responses:
        "201":
          description: 成员邀请已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminInvitationResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/users/{userId}/suspend:
    post:
      tags:
        - Users
      operationId: suspendAdminUser
      summary: 暂停后台成员
      description: 暂停成员后，该成员既有 active 与 needs_attention 后台会话会失效，不得继续执行受保护后台动作。
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/AdminUserId"
      responses:
        "200":
          description: 后台成员已暂停
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserActionResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/users/{userId}/restore:
    post:
      tags:
        - Users
      operationId: restoreAdminUser
      summary: 恢复后台成员
      description: 将已暂停成员恢复为 active；不会恢复已撤销或已处置的旧会话。
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/AdminUserId"
      responses:
        "200":
          description: 后台成员已恢复
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserActionResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/sessions/{sessionId}/remediate:
    post:
      tags:
        - Users
      operationId: remediateAdminSession
      summary: 执行基础后台会话处置
      description: 仅处理 needs_attention 后台会话，支持 revoke 或 mark_resolved 两种 MVP 基础动作；不包含风险评分、设备指纹、自动策略或完整审计调查流。
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/AdminSessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSessionRemediationRequest"
      responses:
        "200":
          description: 后台会话已完成基础处置
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSessionRemediationResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/subtitles/search:
    get:
      tags:
        - Subtitles
      operationId: searchSubtitles
      summary: 统一字幕查询
      description: 外部调用方使用 active Caller Key 查询字幕；无 Provider、无活跃凭据、无结果与上游失败均使用统一错误结构。
      security:
        - CallerKeyBearer: []
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: year
          in: query
          required: false
          schema:
            type: integer
            minimum: 1800
            maximum: 3000
        - name: season
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
        - name: episode
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
        - name: language
          in: query
          required: false
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: 字幕查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubtitleSearchResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /api/subtitles/download:
    get:
      tags:
        - Subtitles
      operationId: downloadSubtitle
      summary: 统一字幕下载
      description: 基于查询结果中的 subtitleId 下载字幕文件；下载失败使用统一错误结构。
      security:
        - CallerKeyBearer: []
      parameters:
        - name: subtitleId
          in: query
          required: true
          description: 来自搜索响应 `results[].id` 的完整网关字幕引用，格式为 `opensubtitles:{providerId}:{file_id}`；调用方不应传裸 OpenSubtitles subtitle record id 或 file_id。
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: 字幕文件内容
          headers:
            Content-Type:
              schema:
                type: string
              description: 字幕文件 MIME 类型，例如 application/x-subrip。
            Content-Disposition:
              schema:
                type: string
              description: attachment 文件下载头，包含安全文件名。
          content:
            application/x-subrip:
              schema:
                type: string
            text/plain:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "502":
