components:
  parameters:
    ProviderId:
      name: providerId
      in: path
      required: true
      schema:
        type: string
      description: Provider 稳定标识。
    CallerKeyId:
      name: keyId
      in: path
      required: true
      schema:
        type: string
      description: CallerKey 稳定标识。
    AdminUserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
      description: AdminUser 稳定标识。
    AdminSessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
      description: AdminSession 稳定标识。
    CredentialId:
      name: credentialId
      in: path
      required: true
      schema:
        type: string
      description: ProviderCredential 稳定标识。
  responses:
    ErrorResponse:
      description: 统一错误响应
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  securitySchemes:
    AdminSession:
      type: apiKey
      in: cookie
      name: subhub_admin_session
      description: 管理端 API 使用的管理员会话 Cookie。
    CallerKeyBearer:
      type: http
      scheme: bearer
      description: 对外字幕 API 使用的下游调用方 Key。
  schemas:
    ErrorCode:
      type: string
      enum:
        - AUTHENTICATION_REQUIRED
        - FORBIDDEN
        - VALIDATION_FAILED
        - SERVICE_NOT_READY
        - CALLER_KEY_INVALID
        - CALLER_KEY_SUSPENDED
        - PROVIDER_UNAVAILABLE
        - PROVIDER_CREDENTIAL_EXHAUSTED
        - NO_RESULTS
        - SUBTITLE_NOT_FOUND
        - UPSTREAM_FAILED
    ErrorDetail:
      type: object
      required:
        - code
        - message
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
        target:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
    BootstrapStatus:
      type: object
      required:
        - initialized
        - mode
        - schemaReady
        - bootstrapReady
        - seedState
        - adminInitializationState
        - missingTables
        - adminUsersCount
        - runtimeGateRequired
        - directUrlReady
        - runtimeReady
        - blockingReasons
        - lastCheckedAt
      properties:
        initialized:
          type: boolean
        mode:
          type: string
          enum:
            - production
            - staging
            - development
        schemaReady:
          type: boolean
        bootstrapReady:
          type: boolean
        seedState:
          type: string
          enum:
            - not_applicable
            - pending
            - applied
        adminInitializationState:
          type: string
          enum:
            - migrated
            - required
            - completed
        missingTables:
          type: array
          items:
            type: string
        adminUsersCount:
          type: integer
          minimum: 0
        runtimeGateRequired:
          type: boolean
        directUrlReady:
          type: boolean
        directUrlError:
          type:
            - string
            - "null"
        runtimeReady:
          type: boolean
        blockingReasons:
          type: array
          items:
            type: string
            enum:
              - direct_url_unreachable
              - schema_not_ready
              - bootstrap_not_ready
              - admin_initialization_required
        lastCheckedAt:
          type: string
          format: date-time
    BootstrapStatusResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/BootstrapStatus"
    CreateInitialAdminRequest:
      type: object
