openapi: 3.1.0
info:
  title: SubHub API
  version: 0.1.0
  description: SubHub MVP 管理控制台与统一字幕出口 API 契约骨架。
servers:
  - url: http://localhost:3000
    description: 本地开发
paths:
  /api/admin/bootstrap/status:
    get:
      tags:
        - Admin Auth
      operationId: getAdminBootstrapStatus
      summary: 查询首轮管理员初始化状态
      responses:
        "200":
          description: 初始化状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapStatusResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/bootstrap:
    post:
      tags:
        - Admin Auth
      operationId: createInitialAdmin
      summary: 创建首个管理员
      description: 仅允许在系统尚未完成首轮初始化时调用；重复初始化会被拒绝。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInitialAdminRequest"
      responses:
        "201":
          description: 首个管理员已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInitialAdminResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/auth/login:
    post:
      tags:
        - Admin Auth
      operationId: loginAdmin
      summary: 管理员登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: 登录成功并写入管理员会话 Cookie
          headers:
            Set-Cookie:
              schema:
                type: string
              description: "`subhub_admin_session` HttpOnly 会话 Cookie。"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/auth/logout:
    post:
      tags:
        - Admin Auth
      operationId: logoutAdmin
      summary: 管理员登出
      security:
        - AdminSession: []
      responses:
        "204":
          description: 当前会话已撤销，Cookie 已清理。
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/auth/me:
    get:
      tags:
        - Admin Auth
      operationId: getCurrentAdmin
      summary: 查询当前登录管理员
      security:
        - AdminSession: []
      responses:
        "200":
          description: 当前管理员
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentAdminResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/dashboard/summary:
    get:
      tags:
        - System
      operationId: getAdminDashboardSummary
      summary: 查询 Dashboard 摘要
      description: 返回 Dashboard 所需的首轮开通、Provider、调用方 Key、队列、缓存、最近异常和下一步入口聚合读模型。
      security:
        - AdminSession: []
      responses:
        "200":
          description: Dashboard 摘要
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummaryResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/providers:
    get:
      tags:
        - Providers
      operationId: listAdminProviders
      summary: 查询 Provider 列表
      description: 返回上游 Provider 与凭据池摘要；不会返回上游凭据明文或密文。
      security:
        - AdminSession: []
      responses:
        "200":
          description: Provider 列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags:
        - Providers
      operationId: createAdminProvider
      summary: 创建 OpenSubtitles Provider
      description: MVP 仅允许创建 OpenSubtitles Provider；可随请求写入首个上游凭据。
      security:
        - AdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderRequest"
      responses:
        "201":
          description: Provider 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDetailResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/providers/{providerId}:
    get:
      tags:
        - Providers
      operationId: getAdminProvider
      summary: 查询 Provider 详情
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      responses:
        "200":
          description: Provider 详情与凭据池
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDetailResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
    patch:
      tags:
        - Providers
      operationId: updateAdminProvider
      summary: 更新 Provider 运行策略
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderRequest"
      responses:
        "200":
          description: Provider 已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDetailResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/providers/{providerId}/enable:
    post:
      tags:
        - Providers
      operationId: enableAdminProvider
      summary: 启用 Provider
      description: 只有存在可参与调度的 active 凭据时才允许启用。
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      responses:
        "200":
          description: Provider 已启用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDetailResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/providers/{providerId}/disable:
    post:
      tags:
        - Providers
      operationId: disableAdminProvider
      summary: 停用 Provider
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      responses:
        "200":
          description: Provider 已停用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDetailResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/providers/{providerId}/credentials:
    get:
      tags:
        - Providers
      operationId: listAdminProviderCredentials
      summary: 查询 Provider 凭据池
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      responses:
        "200":
          description: Provider 凭据列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentialListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags:
        - Providers
      operationId: createAdminProviderCredential
      summary: 新增 Provider 上游凭据
      description: 明文 secret 只允许在写入请求中出现；响应只返回受控展示片段。
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderCredentialRequest"
      responses:
        "201":
          description: Provider 凭据已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentialResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/providers/{providerId}/credentials/{credentialId}/isolate:
    post:
      tags:
        - Providers
      operationId: isolateAdminProviderCredential
      summary: 隔离异常 Provider 凭据
      description: 隔离后该凭据立即退出调度池，不影响同 Provider 下其他 active 凭据。
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
        - $ref: "#/components/parameters/CredentialId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IsolateProviderCredentialRequest"
      responses:
        "200":
          description: Provider 凭据已隔离
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentialActionResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
  /api/admin/providers/{providerId}/credentials/{credentialId}/restore:
    post:
      tags:
        - Providers
      operationId: restoreAdminProviderCredential
      summary: 恢复 Provider 凭据
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/ProviderId"
        - $ref: "#/components/parameters/CredentialId"
      responses:
        "200":
          description: Provider 凭据已恢复为 active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentialActionResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          $ref: "#/components/responses/ErrorResponse"
components:
  parameters:
    ProviderId:
      name: providerId
      in: path
      required: true
      schema:
        type: string
      description: Provider 稳定标识。
    CredentialId:
      name: credentialId
      in: path
      required: true
      schema:
        type: string
      description: ProviderCredential 稳定标识。
  responses:
    ErrorResponse:
      description: 统一错误响应
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  securitySchemes:
    AdminSession:
      type: apiKey
      in: cookie
      name: subhub_admin_session
      description: 管理端 API 使用的管理员会话 Cookie。
    CallerKeyBearer:
      type: http
      scheme: bearer
      description: 对外字幕 API 使用的下游调用方 Key。
  schemas:
    ErrorCode:
      type: string
      enum:
        - AUTHENTICATION_REQUIRED
        - FORBIDDEN
        - VALIDATION_FAILED
        - SERVICE_NOT_READY
        - CALLER_KEY_INVALID
        - CALLER_KEY_SUSPENDED
        - PROVIDER_UNAVAILABLE
        - PROVIDER_CREDENTIAL_EXHAUSTED
        - NO_RESULTS
        - SUBTITLE_NOT_FOUND
        - UPSTREAM_FAILED
    ErrorDetail:
      type: object
      required:
        - code
        - message
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
        target:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
    BootstrapStatus:
      type: object
      required:
        - initialized
      properties:
        initialized:
          type: boolean
    BootstrapStatusResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/BootstrapStatus"
    CreateInitialAdminRequest:
      type: object
      required:
        - identifier
        - displayName
        - password
      properties:
        identifier:
          type: string
          minLength: 1
          description: 管理员登录标识，服务端会规范化为小写。
          example: admin@example.com
        displayName:
          type: string
          minLength: 1
          example: Admin
        password:
          type: string
          minLength: 1
          format: password
    CreateInitialAdminResult:
      type: object
      required:
        - adminUserId
        - status
      properties:
        adminUserId:
          type: string
          example: admin_001
        status:
          type: string
          enum:
            - active
    CreateInitialAdminResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/CreateInitialAdminResult"
    AdminLoginRequest:
      type: object
      required:
        - identifier
        - password
      properties:
        identifier:
          type: string
          minLength: 1
          example: admin@example.com
        password:
          type: string
          minLength: 1
          format: password
        deviceLabel:
          type: string
          maxLength: 120
          description: 可选设备标签，用于后台会话排查。
    AdminPrincipal:
      type: object
      required:
        - id
        - identifier
        - displayName
        - role
      properties:
        id:
          type: string
          example: admin_001
        identifier:
          type: string
          example: admin@example.com
        displayName:
          type: string
          example: Admin
        role:
          type: string
          enum:
            - admin
            - operator
    AdminLoginData:
      type: object
      required:
        - admin
      properties:
        admin:
          $ref: "#/components/schemas/AdminPrincipal"
    AdminLoginResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/AdminLoginData"
    CurrentAdminResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/AdminLoginData"
    ProviderType:
      type: string
      enum:
        - opensubtitles
    ProviderStatus:
      type: string
      enum:
        - enabled
        - disabled
        - needs_config
        - degraded
    ProviderCredentialStatus:
      type: string
      enum:
        - active
        - cooldown
        - isolated
        - disabled
        - exhausted
    Provider:
      type: object
      required:
        - id
        - name
        - type
        - status
        - priority
        - weight
        - concurrencyLimit
        - rotationEnabled
        - cooldownSeconds
        - fallbackProviderId
        - lastHealthStatus
        - lastErrorSummary
        - createdAt
        - updatedAt
        - credentialCount
        - activeCredentialCount
        - availableCredentialCount
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: "#/components/schemas/ProviderType"
        status:
          $ref: "#/components/schemas/ProviderStatus"
        priority:
          type: integer
          minimum: 0
        weight:
          type: integer
          minimum: 0
        concurrencyLimit:
          type: integer
          minimum: 1
        rotationEnabled:
          type: boolean
        cooldownSeconds:
          type: integer
          minimum: 0
        fallbackProviderId:
          type: string
          nullable: true
        lastHealthStatus:
          type: string
          nullable: true
        lastErrorSummary:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        credentialCount:
          type: integer
          minimum: 0
        activeCredentialCount:
          type: integer
          minimum: 0
        availableCredentialCount:
          type: integer
          minimum: 0
    ProviderCredential:
      type: object
      required:
        - id
        - providerId
        - label
        - displayPrefix
        - displaySuffix
        - status
        - remainingQuota
        - lastUsedAt
        - lastErrorAt
        - lastErrorSummary
        - cooldownUntil
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        providerId:
          type: string
        label:
          type: string
        displayPrefix:
          type: string
          nullable: true
        displaySuffix:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/ProviderCredentialStatus"
        remainingQuota:
          type: integer
          nullable: true
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        lastErrorAt:
          type: string
          format: date-time
          nullable: true
        lastErrorSummary:
          type: string
          nullable: true
        cooldownUntil:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProviderDetail:
      allOf:
        - $ref: "#/components/schemas/Provider"
        - type: object
          required:
            - credentials
          properties:
            credentials:
              type: array
              items:
                $ref: "#/components/schemas/ProviderCredential"
    ProviderList:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Provider"
        total:
          type: integer
          minimum: 0
    ProviderListResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/ProviderList"
    ProviderDetailResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/ProviderDetail"
    ProviderCredentialList:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProviderCredential"
        total:
          type: integer
          minimum: 0
    ProviderCredentialListResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/ProviderCredentialList"
    ProviderCredentialResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/ProviderCredential"
    ProviderCredentialAction:
      type: object
      required:
        - credential
        - provider
      properties:
        credential:
          $ref: "#/components/schemas/ProviderCredential"
        provider:
          $ref: "#/components/schemas/ProviderDetail"
    ProviderCredentialActionResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/ProviderCredentialAction"
    CreateProviderCredentialRequest:
      type: object
      required:
        - label
        - secret
      properties:
        label:
          type: string
          minLength: 1
        secret:
          type: string
          minLength: 1
          format: password
    CreateProviderRequest:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          minLength: 1
        type:
          $ref: "#/components/schemas/ProviderType"
        initialCredential:
          $ref: "#/components/schemas/CreateProviderCredentialRequest"
    UpdateProviderRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        priority:
          type: integer
          minimum: 0
        weight:
          type: integer
          minimum: 0
        concurrencyLimit:
          type: integer
          minimum: 1
        rotationEnabled:
          type: boolean
        cooldownSeconds:
          type: integer
          minimum: 0
        fallbackProviderId:
          type: string
          nullable: true
    IsolateProviderCredentialRequest:
      type: object
      properties:
        reason:
          type: string
          minLength: 1
    ReadinessSummary:
      type: object
      required:
        - adminInitialized
        - activeProviderCount
        - activeCallerKeyCount
        - gatewayReady
        - missingConditions
        - lastCheckedAt
      properties:
        adminInitialized:
          type: boolean
        activeProviderCount:
          type: integer
          minimum: 0
        activeCallerKeyCount:
          type: integer
          minimum: 0
        gatewayReady:
          type: boolean
        missingConditions:
          type: array
          items:
            type: string
            enum:
              - admin
              - provider
              - caller_key
        lastCheckedAt:
          type: string
          format: date-time
    DashboardNorthStar:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          enum:
            - ready
            - not_ready
        message:
          type: string
    DashboardProviderSnapshotItem:
      type: object
      required:
        - id
        - name
        - type
        - status
        - activeCredentialCount
        - lastHealthStatus
        - lastErrorSummary
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        status:
          type: string
        activeCredentialCount:
          type: integer
          minimum: 0
        lastHealthStatus:
          type: string
          nullable: true
        lastErrorSummary:
          type: string
          nullable: true
    DashboardProviderSnapshot:
      type: object
      required:
        - total
        - available
        - needsAttention
        - items
      properties:
        total:
          type: integer
          minimum: 0
        available:
          type: integer
          minimum: 0
        needsAttention:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: "#/components/schemas/DashboardProviderSnapshotItem"
    DashboardCallerKeySnapshot:
      type: object
      required:
        - active
        - suspended
        - rotated
      properties:
        active:
          type: integer
          minimum: 0
        suspended:
          type: integer
          minimum: 0
        rotated:
          type: integer
          minimum: 0
    DashboardQueueSummary:
      type: object
      required:
        - status
        - pendingJobs
        - failedJobs
      properties:
        status:
          type: string
          enum:
            - idle
        pendingJobs:
          type: integer
          minimum: 0
        failedJobs:
          type: integer
          minimum: 0
    DashboardCacheSummary:
      type: object
      required:
        - status
        - hitRate
        - coverage
      properties:
        status:
          type: string
          enum:
            - not_configured
        hitRate:
          type: number
          nullable: true
        coverage:
          type: string
          enum:
            - not_available
    DashboardRecentIssue:
      type: object
      required:
        - id
        - targetType
        - targetId
        - message
        - createdAt
      properties:
        id:
          type: string
        targetType:
          type: string
        targetId:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    DashboardNextAction:
      type: object
      required:
        - id
        - label
        - href
        - priority
      properties:
        id:
          type: string
        label:
          type: string
        href:
          type: string
        priority:
          type: string
          enum:
            - high
            - medium
    DashboardSummary:
      type: object
      required:
        - readiness
        - northStar
        - providerSnapshot
        - callerKeySnapshot
        - queue
        - cache
        - recentIssues
        - nextActions
      properties:
        readiness:
          $ref: "#/components/schemas/ReadinessSummary"
        northStar:
          $ref: "#/components/schemas/DashboardNorthStar"
        providerSnapshot:
          $ref: "#/components/schemas/DashboardProviderSnapshot"
        callerKeySnapshot:
          $ref: "#/components/schemas/DashboardCallerKeySnapshot"
        queue:
          $ref: "#/components/schemas/DashboardQueueSummary"
        cache:
          $ref: "#/components/schemas/DashboardCacheSummary"
        recentIssues:
          type: array
          items:
            $ref: "#/components/schemas/DashboardRecentIssue"
        nextActions:
          type: array
          items:
            $ref: "#/components/schemas/DashboardNextAction"
    DashboardSummaryResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/DashboardSummary"
